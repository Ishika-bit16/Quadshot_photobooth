<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadshot-snaps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="snap">
    
  <div> 
    <nav id="navbar">
    
            <div id="logo"><a href="index.html">Quadshot</a></div>
           <div id="links">
            <li><a href="index.html">Home</a></li>
            <li><a href="snaps.html">Snaps</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
           </div>
           <div id="rightnav"><a href="https://github.com/Ishika-bit16/Quadshot_photobooth" target="_blank"></a></div>

    </nav></div>

  <div class="card">
  <div class="wordmark">
   
  </div>
 
  <!-- viewfinder -->
  <div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="flash" id="flash"></div>
    <div class="countdown" id="countdown"></div>
 
    <!-- camera start prompt -->
    <div class="cam-prompt" id="camPrompt">
      <img id="camera"  src="assets/camera.png" alt="camera icon" class="cam-icon" />
      <p>Camera access needed</p>
      <button id="startCamBtn">Enable Camera</button>
    </div>
  </div>
 
  <!-- filter row -->
  <div class="filter-row">
    <div class="filter-pill">
      <button class="filter-btn active" data-filter="none"       title="Original">  <div class="swatch"></div></button>
      <button class="filter-btn"        data-filter="grayscale"  title="B&W">       <div class="swatch"></div></button>
      <button class="filter-btn"        data-filter="sepia"      title="Sepia">     <div class="swatch"></div></button>
      <button class="filter-btn"        data-filter="saturate"   title="Vivid">     <div class="swatch"></div></button>
      <button class="filter-btn"        data-filter="cool"       title="Cool">      <div class="swatch"></div></button>
      <button class="filter-btn"        data-filter="invert"     title="Invert">    <div class="swatch"></div></button>
    </div>
  </div>
 
  <!-- snap button -->
  <div class="snap-wrap">
    <button class="snap-btn" id="snapBtn" disabled>Snap</button>
  </div>
 
  <!-- photo strip -->
  <div class="strip" id="strip"></div>
</div>
 
<!-- lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <img id="lbImg" src="" alt="snap" />
  <a class="lb-dl" id="lbDl" download="snap.png">Download</a>
</div>
    
</body>
</html>
